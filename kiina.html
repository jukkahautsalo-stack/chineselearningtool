<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chinese Trainer</title>

<style>
body {
    font-family: -apple-system, sans-serif;
    text-align: center;
    background: #111;
    color: #eee;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
}

button {
    padding: 14px;
    margin: 6px;
    font-size: 18px;
    width: 90%;
    color: #111;
    max-width: 400px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
}

#question {
    font-size: 56px;
    margin: 20px 0;
}

.correct {
    color: #6f6;
}

.wrong {
    color: #f66;
}

input {
    font-size: 22px;
    padding: 10px;
    width: 80%;
    max-width: 400px;
}

#menu {
    margin-top: 20px;
}

#quiz {
    display: none;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#extra {
    margin: 10px 0 20px 0;
    font-size: 20px;
    min-height: 24px;
    color: #ccc;
}

#options {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

#options button {
    flex: 1 1 45%;
    margin: 8px;
}

#inputArea {
    margin: 15px 0;
}

#feedback {
    margin-top: 20px;
    font-size: 22px;
    min-height: 28px;
}

#datasetSelect {
    margin: 20px;
}
</style>
</head>

<body>

<h2>Chinese Trainer</h2>

<div id="datasetSelect">
  <label for="sizeSelect" style="font-size:18px;">Choose dataset size:</label>
  <select id="sizeSelect" onchange="changeDatasetSize()" style="font-size:18px; padding: 6px; margin-left: 12px;">
    <option value="30" selected>30 characters</option>
    <option value="50">50 characters</option>
    <option value="100">100 characters</option>
    <option value="500">500 characters</option>
  </select>
</div>

<div id="menu">
    <button onclick="start(0)">Char → Pinyin</button>
    <button onclick="start(1)">Pinyin → Char (MC)</button>
    <button onclick="start(2)">Write Character</button>
    <button onclick="start(3)">Tone Quiz</button>
</div>

<div id="quiz">
    <div id="question"></div>
    <div id="extra"></div>
    <div id="options"></div>

    <div id="inputArea" style="display:none;">
        <input id="input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        <button onclick="submitTyping()">OK</button>
    </div>

    <div id="feedback"></div>
    <button onclick="quit()" style="margin-top: 30px; width: 200px; background: #444; color: #eee;">Quit</button>
</div>

// tone marks
function tone(p, t) {
    const tones = {
        a:["ā","á","ǎ","à","a"],
        e:["ē","é","ě","è","e"],
        i:["ī","í","ǐ","ì","i"],
        o:["ō","ó","ǒ","ò","o"],
        u:["ū","ú","ǔ","ù","u"],
        v:["ǖ","ǘ","ǚ","ǜ","ü"]
    };
    for (let v in tones) {
        if (p.includes(v)) return p.replace(v, tones[v][t - 1]); // t-1 works for 1-5
    }
    return p;
}

let datasetSize = 30; // default
let rawCurrent = raw30;
let data = [];

function changeDatasetSize() {
    const size = document.getElementById("sizeSelect").value;
    datasetSize = parseInt(size);

    if (datasetSize === 30) rawCurrent = raw30;
    else if (datasetSize === 50) rawCurrent = raw50;
    else if (datasetSize === 100) rawCurrent = raw100;
    else if (datasetSize === 500) rawCurrent = raw500;

    data = rawCurrent.map(d => [d[0], tone(d[1], d[2]), d[1], d[2], d[3]]);
}

// Initialize data
changeDatasetSize();

let mode, current;

function rand() {
    return data[Math.floor(Math.random() * data.length)];
}

function start(m) {
    mode = m;
    document.getElementById("datasetSelect").style.display = "none";
    document.getElementById("menu").style.display = "none";
    document.getElementById("quiz").style.display = "flex";
    next();
}

function next() {
    document.getElementById("feedback").innerHTML = "";
    document.getElementById("options").innerHTML = "";
    document.getElementById("inputArea").style.display = "none";
    document.getElementById("extra").innerHTML = "";

    current = rand();

    if (mode === 0) {
        // char → pinyin
        setQ(current[0]);
        mc(current[1], d => d[1]);

    } else if (mode === 1) {
        // pinyin → char + meaning (meaning hidden until feedback)
        setQ(current[1]);
        mc(current[0], d => d[0]);

    } else if (mode === 2) {
        // typing
        setQ(current[1]);
        document.getElementById("inputArea").style.display = "block";

    } else {
        // tone quiz
        setQ(current[0]);

        let base = current[2];
        let correct = current[1];

        let opts = [];
        for (let i = 1; i <= 4; i++) opts.push(tone(base, i));

        mcFromList(correct, opts);
    }
}

function setQ(q) {
    document.getElementById("question").innerText = q;
}

function mc(correct, pick) {
    let opts = [correct];
    while (opts.length < 4) {
        let r = pick(rand());
        if (!opts.includes(r)) opts.push(r);
    }
    mcFromList(correct, opts);
}

function mcFromList(correct, opts) {
    opts.sort(() => Math.random() - 0.5);

    opts.forEach(o => {
        let b = document.createElement("button");
        b.innerText = o;

        b.onclick = () => {
            if (o === correct) {
                b.style.background = "green";
                feedback("Correct", 1);
            } else {
                b.style.background = "red";
                feedback("Wrong (" + correct + ")", 0);
            }
        };

        document.getElementById("options").appendChild(b);
    });
}

function submitTyping() {
    let v = document.getElementById("input").value.trim();
    if (v === current[0]) {
        feedback("Correct", 1);
    } else {
        feedback("Wrong (" + current[0] + ")", 0);
    }
    document.getElementById("input").value = "";
}

function feedback(text, good) {
    let f = document.getElementById("feedback");
    f.innerText = text;
    f.className = good ? "correct" : "wrong";

    // Show English meaning only after answer
    document.getElementById("extra").innerText = current[4];

    // Disable options/input while showing feedback
    disableInputs(true);

    setTimeout(() => {
        disableInputs(false);
        next();
    }, 2000);
}

function disableInputs(disable) {
    // Disable all buttons in options
    let buttons = document.getElementById("options").querySelectorAll("button");
    buttons.forEach(b => b.disabled = disable);

    // Disable typing input and button if visible
    let input = document.getElementById("input");
    let okBtn = input.nextElementSibling;
    input.disabled = disable;
    if (okBtn) okBtn.disabled = disable;
}

function quit() {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("menu").style.display = "block";
    document.getElementById("datasetSelect").style.display = "block";
    document.getElementById("feedback").innerText = "";
    document.getElementById("extra").innerText = "";
    document.getElementById("options").innerHTML = "";
    document.getElementById("inputArea").style.display = "none";
    document.getElementById("input").value = "";
}
